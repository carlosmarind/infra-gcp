apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-role
    #  namespace: target # Should be namespace you are granting access to
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-rolebinding
  #namespace: target # Should be namespace you are granting access to
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: admin-role # Should match name of Role
subjects:
- namespace: default # Should match namespace where SA lives
  kind: ServiceAccount
  name: admin-service-account # Should match service account name, above
